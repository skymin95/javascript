<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>carousel(캐러셀) 슬라이드</title>
  <style>
    .slide-wrapper *{margin: 0px; padding: 0px;}
    ul,ol,li{list-style: none;}
    a{text-decoration: none; color: #333;}
    .slide-wrapper{
      width: 960px; height: 300px;
      margin: 0px auto;
      border: 3px solid #000;
      position: relative; 
    }
    /* 1500+ (여백값 )120 */
    .slide{width: 1620px;
      display: flex;
      /* 이거 줘야 박스 움직임 */
      position: relative;left: 0px;
      transition: 0.5s;

    
    }
    /* li에 넓이 주고  위에 부모크기 정하기 1500에 여백 생각 */
    .slide > li{
      width: 300px; height: 300px;
      background: #ff0;  
       
    }
    /* 여백 설정  마지막을 제외한다 not*/
    .slide > li:not(:last-child){
      margin-right: 30px;
    }
   #b_left{
    position: absolute; bottom: 50%; left: 0px;
   }
#b_right{
  position: absolute; bottom: 50%;  right: 0px;
}


  </style>

<script src="./js/carousel.js" defer></script>

</head>
<body>
  <h2>carousel(캐러셀) 슬라이드</h2>
  <p>캐러셀은, CSS 3D 트랜스폼과 약간의 JavaScript로 만들어진, 일련의 콘텐츠를 순환시키기 위한 슬라이드쇼입니다.
     일련의 이미지, 텍스트, 혹은 사용자 정의 마크업으로 동작합니다. 
     그리고 이전/다음의 컨트롤이나 위치 표시(인디게이터, indicator)도 지원합니다.
    </p>

    <article class="slide-wrapper">
      <ul class="slide">  
        <li><div>1</div></li>
        <li><div>2</div></li>
        <li><div>3</div></li>
        <li><div>4</div></li>
        <li><div>5</div></li>
      </ul>
      <!-- 클릭시 위로 안가게 1) #none; / 2) javscript:; / 3) javascript:void(0);/4)  event.preventDefault(); -->
      <a href="#" title="이전" id="b_left" class="button">이전</a>
      <a href="#" title="다음" id="b_right" class="button">다음</a>
      
    </article>




</body>
</html>
