<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제이쿼리 문서객체 조작-scroll layout</title>
  <!-- 레이아웃 서식 -->
  <link rel="stylesheet" href="./css/layout.css">

  <!-- features 300~900    800~1639

  <script>
    $(function(){
      // 1.내비게이션 메뉴 클릭시 해당하는 인덱스 값 구하기
      let mnu=$('header .gnb > ul > li');


      // 세로 방향  가로방향은 top을 left,right
      mnu.click(function(){
        let n = $(this).index();
        console.log(n);
        $('html, body').animate({scrollTop:$('section').eq(n).offset().top-50},500);
        return false;
      });-50




      // 화면스크롤 값 출력해보기
      $(window).scroll(function(){  
        let spos = $(this).scrollTop();
        console.log(spos);
        
        // 만약 아래 해당하는 조건범위 맞는 a요소에 서식 적용하기
        // if(spos>=42&&spos<=940){
        //   $('.gnb> ul li a').removeClass('t_act');
        //   $('.gnb > ul > li:first-child a').addClass('t_act');
        // }else if(spos>=940&&spos<=1840){
        //   $('.gnb> ul li a').removeClass('t_act');
        //   $('.gnb > ul > li:nth-child(2) a').addClass('t_act');
        // }else if(spos>=1842&&spos<=2740){
        //   $('.gnb> ul li a').removeClass('t_act');
        //   $('.gnb > ul > li:nth-child(3) a').addClass('t_act');
        // }else if(spos>=2742&&spos<=3640){
        //   $('.gnb> ul li a').removeClass('t_act');
        //   $('.gnb > ul > li:nth-child(4) a').addClass('t_act');
        // }else if(spos>=3642&&spos<=4540){
        //   $('.gnb> ul li a').removeClass('t_act');
        //   $('.gnb > ul > li:nth-child(5) a').addClass('t_act');
        // }else if(spos>=4552&&spos<=5450){
        //   $('.gnb> ul li a').removeClass('t_act');
        //   $('.gnb > ul > li:nth-child(6) a').addClass('t_act');
        // }
      
        // offset메서드로 각각 해당하는 박스의 위치값에 따른 서식적용하기 
        $('main section').each(function(i){//i번쨰
          let top = $(this).offset().top-50;
          if(spos >= top){//만약에 spos의 값이 top보다 크면
            $('.gnb li a').removeClass('t_act');//기존 서식을 제거
            $('.gnb li').eq(i).find('a').addClass('t_act');
            //해당메뉴에 서식적용한다.
          }
        });









      });
    });
  </script>
</head>
